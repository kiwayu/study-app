<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Session</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600&display=optional" rel="stylesheet">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/themes.css">
</head>
<body>

  <!-- ── Login screen ──────────────────────────────────────── -->
  <div class="login-screen" id="login-screen">
    <div class="login-card">
      <h1 class="login-title">Study Session</h1>
      <p class="login-subtitle">Sign in to track your study sessions</p>
      <div class="login-buttons">
        <a href="/auth/login/google" class="btn-oauth btn-google">
          <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </a>
        <a href="/auth/login/github" class="btn-oauth btn-github">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          Continue with GitHub
        </a>
      </div>
    </div>
  </div>

  <div class="app-shell" style="display:none">

    <!-- ── Timer panel (left) ──────────────────────────────── -->
    <aside class="timer-panel">

      <div class="timer-top-row">
        <div class="session-meta">
          <span class="segment-label" id="segment-label">Focus</span>
          <span class="pomodoro-count" id="pomodoro-count">0 / 4</span>
        </div>
        <button id="theme-btn" class="btn-icon" title="Toggle theme" aria-label="Toggle light/dark mode">
          <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button id="pin-btn" class="btn-icon is-unpinned" title="Pin window on top" aria-label="Toggle always on top">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="17" x2="12" y2="22"/>
            <path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/>
          </svg>
        </button>
        <button class="btn-icon" id="settings-btn" aria-label="Open settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <div class="user-profile" id="user-profile" style="display:none">
          <img class="user-avatar" id="user-avatar" src="" alt="Profile">
          <button class="btn-icon" id="logout-btn" title="Sign out" aria-label="Sign out">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="timer-ring-wrapper">
        <svg class="timer-ring" viewBox="0 0 120 120" aria-hidden="true">
          <circle class="ring-track" cx="60" cy="60" r="54"/>
          <circle class="ring-progress" id="timer-ring-progress" cx="60" cy="60" r="54"
                  stroke-dasharray="339.292" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-digits-container">
          <span class="timer-digits" id="timer-digits">25:00</span>
        </div>
      </div>

      <div class="timer-controls">
        <button class="btn-secondary btn-sm" id="stop-btn" style="display:none" aria-label="Stop session">Stop</button>
        <button class="btn-primary" id="start-btn" aria-label="Start session">Start</button>
        <button class="btn-secondary btn-sm" id="pause-btn" style="display:none" aria-label="Pause session">Pause</button>
      </div>

      <div class="kb-help-wrapper">
        <button class="kb-help-btn" id="kb-help-btn" aria-label="Keyboard shortcuts" title="Keyboard shortcuts (Ctrl+/)">?</button>
        <div class="kb-help-panel" id="kb-help-panel" aria-hidden="true">
          <table class="kb-table">
            <tbody>
              <tr><td><kbd>Space</kbd></td><td>Start / Pause / Resume</td></tr>
              <tr><td><kbd>Esc</kbd></td><td>Stop timer / Close panel</td></tr>
              <tr><td><kbd>Ctrl+N</kbd></td><td>Focus task input</td></tr>
              <tr><td><kbd>Ctrl+,</kbd></td><td>Open settings</td></tr>
              <tr><td><kbd>Ctrl+/</kbd></td><td>Toggle this help</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </aside>

    <!-- ── Task board (right) ──────────────────────────────── -->
    <main class="task-board">

      <div class="board-header">
        <div class="board-title-row">
          <span class="board-title">Tasks</span>
          <button class="btn-ghost" id="sort-btn" aria-label="Sort tasks by pomodoros">Sort</button>
          <button class="btn-ghost" id="stats-btn" aria-label="View completion stats">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="18" y="3" width="4" height="18"/><rect x="10" y="8" width="4" height="13"/><rect x="2" y="13" width="4" height="8"/>
            </svg>
          </button>
        </div>

        <div class="task-filter-row">
          <input type="search" id="task-search" placeholder="Search tasks…" class="task-search-input">
          <select id="filter-priority" class="filter-select">
            <option value="">All priorities</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
          <button id="filter-done-btn" class="btn-ghost btn-sm">Hide done</button>
        </div>

        <form class="quick-add-form" id="add-task-form" novalidate>
          <input
            type="text"
            id="new-task-title"
            class="quick-add-input"
            placeholder="Add a task…"
            autocomplete="off"
            required
          >
          <div class="quick-add-meta">
            <input type="number" id="new-task-pomodoros" class="meta-number" value="1" min="1" max="9" aria-label="Estimated pomodoros">
            <input id="new-task-segment" type="number" min="5" max="120"
                   placeholder="25m" class="meta-number" title="Segment duration in minutes (leave blank for default)"
                   style="width:52px">
            <select id="new-task-priority" class="meta-select" aria-label="Priority">
              <option value="high">High</option>
              <option value="medium" selected>Med</option>
              <option value="low">Low</option>
            </select>
            <input type="text" id="new-task-category" class="meta-tag" placeholder="Tag" autocomplete="off" aria-label="Category">
            <button type="submit" class="btn-add-inline" aria-label="Add task">Add</button>
          </div>
        </form>
      </div>

      <div class="task-list" id="task-list" role="list" aria-label="Task list"></div>

      <div class="notes-section" id="notes-section">
        <div class="notes-header">
          <span class="notes-label">Today's notes</span>
          <span class="notes-hint">Auto-saved</span>
        </div>
        <textarea id="session-notes" class="notes-textarea" placeholder="Jot down what you're working on…" maxlength="2000" rows="4" spellcheck="true"></textarea>
      </div>

      <div id="day-ruler" class="day-ruler" aria-hidden="true"></div>

    </main>

  </div><!-- /.app-shell -->

  <!-- ── Settings ──────────────────────────────────────────── -->
  <div class="settings-overlay" id="settings-overlay" aria-hidden="true"></div>

  <div class="settings-drawer" id="settings-drawer" role="dialog" aria-label="Settings" aria-modal="true">
    <div class="settings-header">
      <span class="settings-title">Settings</span>
      <button class="btn-icon" data-cancel aria-label="Close settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="settings-body">
      <div class="settings-section">
        <span class="settings-section-title">Theme</span>
        <div class="theme-grid" id="theme-grid"></div>
      </div>
      <div class="settings-divider"></div>
      <label class="settings-field">
        <span class="settings-label">Focus</span>
        <div class="settings-input-row">
          <input type="number" id="s-pomodoro" class="input-number-lg" min="1" max="60" value="25">
          <span class="input-unit">min</span>
        </div>
      </label>
      <label class="settings-field">
        <span class="settings-label">Short Break</span>
        <div class="settings-input-row">
          <input type="number" id="s-short" class="input-number-lg" min="1" max="30" value="5">
          <span class="input-unit">min</span>
        </div>
      </label>
      <label class="settings-field">
        <span class="settings-label">Long Break</span>
        <div class="settings-input-row">
          <input type="number" id="s-long" class="input-number-lg" min="1" max="60" value="15">
          <span class="input-unit">min</span>
        </div>
      </label>
      <label class="settings-field">
        <span class="settings-label">Water Reminder</span>
        <div class="settings-input-row">
          <input type="number" id="s-water" class="input-number-lg" min="1" max="120" value="45">
          <span class="input-unit">min</span>
        </div>
      </label>
      <label class="settings-field">
        <span class="settings-label">Stretch Reminder</span>
        <div class="settings-input-row">
          <input type="number" id="s-stretch" class="input-number-lg" min="1" max="120" value="60">
          <span class="input-unit">min</span>
        </div>
      </label>
    </div>
    <div class="settings-footer">
      <button class="btn-secondary" data-cancel>Cancel</button>
      <button class="btn-primary" id="settings-save">Save</button>
    </div>
  </div>

  <!-- ── Stats panel ───────────────────────────────────────── -->
  <div class="settings-overlay" id="stats-overlay" aria-hidden="true"></div>

  <div class="stats-panel" id="stats-panel" role="dialog" aria-label="Completion stats" aria-modal="true">
    <div class="settings-header">
      <span class="settings-title">Activity</span>
      <div style="display:flex;gap:6px;align-items:center">
        <button id="stats-view-year"  class="btn-ghost btn-sm is-active">Year</button>
        <button id="stats-view-month" class="btn-ghost btn-sm">Month</button>
        <button id="stats-view-est"   class="btn-ghost btn-sm">Accuracy</button>
        <button id="stats-view-notes" class="btn-ghost btn-sm">Notes</button>
        <button class="btn-icon" data-stats-close aria-label="Close stats">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="stats-body">
      <div id="stats-heatmap" class="stats-heatmap"></div>
    </div>
  </div>

  <!-- ── Toast container ───────────────────────────────────── -->
  <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
